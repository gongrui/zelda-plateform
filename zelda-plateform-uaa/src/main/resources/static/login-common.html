<!DOCTYPE html>
<meta charset="UTF-8">
<title>登录</title>
<style>
    body{background:#f5f7fa;font-family:Microsoft Yahei}
    .box{width:360px;margin:100px auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
    input{width:100%;height:44px;margin-bottom:20px;padding:0 15px;border:1px solid #ddd;border-radius:4px}
    button{width:100%;height:46px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer}
</style>

<div class="box">
    <h2>OAuth2 登录</h2>
    <input id="name" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
</div>

<script>
    async function login() {
        const name = document.getElementById('name').value
        const pwd = document.getElementById('pwd').value
        const res = await fetch('/oauth2/doLogin?name=' + name + '&pwd=' + pwd)
        const json = await res.json()
        if (json.code === 200) {
            location.reload()
        } else {
            alert(json.msg)
        }
    }
</script>
